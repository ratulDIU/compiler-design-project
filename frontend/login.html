<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ATM Shield</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="auth-page compact-auth">
    <section class="auth-visual">
        <img src="https://images.unsplash.com/photo-1554224155-6726b3ff858f?auto=format&fit=crop&w=900&q=80" alt="Financial security workspace">
        <div class="auth-visual-copy">
            <p class="eyebrow">Secure Login</p>
            <h1>Review fraud signals with your verified account.</h1>
            <p>Sign in with your user name and password to analyze transaction behavior.</p>
        </div>
    </section>

    <section class="auth-panel">
        <a class="brand" href="login.html">ATM Shield</a>
        <div class="section-heading">
            <p class="eyebrow">Welcome Back</p>
            <h2>Sign in</h2>
            <p>Only verified users can submit transaction checks.</p>
        </div>

        <form id="loginForm" class="form-stack">
            <label>
                <span>User Name</span>
                <input id="username" type="text" autocomplete="username" placeholder="Enter user name">
            </label>

            <label>
                <span>Password</span>
                <input id="pass" type="password" autocomplete="current-password" placeholder="Enter password">
            </label>

            <p id="notice" class="notice" role="status"></p>
            <button class="btn btn-primary" type="submit">Sign In</button>
        </form>

        <p class="auth-link">New to ATM Shield? <a href="register.html">Create account</a></p>
    </section>
</main>
<script src="js/auth.js"></script>
</body>
</html>
