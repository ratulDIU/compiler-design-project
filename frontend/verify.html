<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP | ATM Shield</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="auth-page compact-auth">
    <section class="auth-visual">
        <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=900&q=80" alt="Card payment verification">
        <div class="auth-visual-copy">
            <p class="eyebrow">Email Verification</p>
            <h1>One code confirms the account is yours.</h1>
            <p>Enter the OTP sent to your email address to activate login access.</p>
        </div>
    </section>

    <section class="auth-panel">
        <a class="brand" href="login.html">ATM Shield</a>
        <div class="section-heading">
            <p class="eyebrow">OTP</p>
            <h2>Verify your account</h2>
            <p>Use the latest code from your email.</p>
        </div>

        <form id="verifyForm" class="form-stack">
            <label>
                <span>OTP</span>
                <input id="otp" type="text" inputmode="numeric" maxlength="6" placeholder="Enter 6 digit OTP">
            </label>

            <p id="notice" class="notice" role="status"></p>
            <button class="btn btn-primary" type="submit">Verify Account</button>
        </form>

        <p class="auth-link">Need a new account? <a href="register.html">Register again</a></p>
    </section>
</main>
<script src="js/auth.js"></script>
</body>
</html>
