<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | ATM Shield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-mesh">
<script src="js/shell.js"></script>
<script>renderShell('dashboard');</script>

<main class="profile-page">
  <section class="profile-hero">
    <div class="page-eyebrow">User Profile</div>
    <h1 class="page-title">Verified account information</h1>
    <p class="page-subtitle">These details are tied to the secure profile used for fraud analysis, reporting, and access control.</p>
  </section>

  <section class="profile-card">
    <div class="profile-avatar" id="profileAvatar">U</div>
    <div class="profile-details">
      <p id="profileNotice" class="notice" role="status"></p>
      <dl class="profile-list">
        <div>
          <dt>User Name</dt>
          <dd id="profileUsername">Loading...</dd>
        </div>
        <div>
          <dt>Account Number</dt>
          <dd id="profileAccount">Loading...</dd>
        </div>
        <div>
          <dt>Email</dt>
          <dd id="profileEmail">Loading...</dd>
        </div>
      </dl>
    </div>
  </section>
</main>

<script src="js/profile.js"></script>
</body>
</html>
