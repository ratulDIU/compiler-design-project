<!DOCTYPE html>
<html>
<head>
<title>ATM Fraud Detection</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded shadow">

<h2 class="text-2xl font-bold mb-4">ATM Fraud Detection</h2>

<form id="form" class="space-y-3">

<input id="account" class="border p-2 w-full" placeholder="Account Number">

<div id="transactions"></div>

<button type="button" onclick="addTransaction()" 
class="bg-green-500 text-white px-3 py-1 rounded">
➕ Add Transaction
</button>

<input id="interval" class="border p-2 w-full" placeholder="Time Interval">

<button type="submit" 
class="bg-blue-500 text-white px-4 py-2 rounded w-full">
Analyze
</button>

</form>

</div>

<script>

let count = 0

function addTransaction(){

    count++

    const div = document.createElement("div")
    div.className = "flex gap-2"

    div.innerHTML = `
        <input id="amount${count}" class="border p-2 w-full" placeholder="Amount">
        <input id="loc${count}" class="border p-2 w-full" placeholder="Location">
        <button type="button" onclick="this.parentElement.remove()" class="bg-red-500 text-white px-2">X</button>
    `

    document.getElementById("transactions").appendChild(div)
}

</script>

<script src="js/app.js"></script>

</body>
</html>
