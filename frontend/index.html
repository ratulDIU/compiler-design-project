<!DOCTYPE html>
<html>
<head>
<title>ATM Fraud Detection</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded shadow">

<h2 class="text-2xl font-bold mb-4">ATM Fraud Detection</h2>

<form id="form" class="space-y-3">

<input id="account" class="border p-2 w-full" placeholder="Account Number">

<div id="transactions"></div>

<button type="button" onclick="addTransaction()" 
class="bg-green-500 text-white px-3 py-1 rounded">
➕ Add Transaction
</button>

<!-- 🔥 TIME FIELD -->
<div id="timeWrapper" style="display:none;">
<input id="interval" class="border p-2 w-full" placeholder="Time Interval (minutes)">
</div>

<button type="submit" 
class="bg-blue-500 text-white px-4 py-2 rounded w-full">
Analyze
</button>

</form>

</div>

<script>
let count = 0

function addTransaction(){

    count++

    const div = document.createElement("div")
    div.className = "flex gap-2 mt-2"

    div.innerHTML = `
        <input id="amount${count}" class="border p-2 w-full" placeholder="Withdraw Amount">

        <input id="loc${count}" class="border p-2 w-full bg-gray-100" 
        placeholder="Auto Detect Location" readonly>

        <button type="button" onclick="detectLocation(${count})"
        class="bg-yellow-500 text-white px-2">📍</button>

        <button type="button" onclick="removeTransaction(this)" 
        class="bg-red-500 text-white px-2">X</button>
    `

    document.getElementById("transactions").appendChild(div)

    toggleTimeField()
}


// ❌ REMOVE TRANSACTION
function removeTransaction(btn){
    btn.parentElement.remove()
    count--
    toggleTimeField()
}


// 🔥 SHOW/HIDE TIME FIELD
function toggleTimeField(){
    const timeDiv = document.getElementById("timeWrapper")

    if(count > 1){
        timeDiv.style.display = "block"
    }else{
        timeDiv.style.display = "none"
    }
}


// 📍 AUTO DETECT
function detectLocation(index){

    if(!navigator.geolocation){
        alert("Geolocation not supported")
        return
    }

    navigator.geolocation.getCurrentPosition(position => {

        const lat = position.coords.latitude
        const lon = position.coords.longitude

        document.getElementById("loc"+index).value = `${lat},${lon}`

    }, () => {
        alert("Location permission denied")
    })
}
</script>

<script src="js/app.js"></script>

</body>
</html>
