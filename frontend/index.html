<!DOCTYPE html>
<html>
<head>
<title>ATM Fraud Detection</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded shadow">

<h2 class="text-2xl font-bold mb-4">ATM Fraud Detection</h2>

<form id="form" class="space-y-3">

<input id="account" class="border p-2 w-full" placeholder="Account Number">

<input id="amount1" class="border p-2 w-full" placeholder="Withdraw Amount 1">
<input id="loc1" class="border p-2 w-full" placeholder="Location 1">

<input id="amount2" class="border p-2 w-full" placeholder="Withdraw Amount 2">
<input id="loc2" class="border p-2 w-full" placeholder="Location 2">

<input id="amount3" class="border p-2 w-full" placeholder="Withdraw Amount 3">
<input id="loc3" class="border p-2 w-full" placeholder="Location 3">

<input id="interval" class="border p-2 w-full" placeholder="Time Interval">

<button class="bg-blue-500 text-white px-4 py-2 rounded w-full">
Analyze
</button>

</form>

</div>

<script src="js/app.js"></script>

</body>
</html>
