<!DOCTYPE html>
<html>
<head>
<title>Fraud Result</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-lg mx-auto mt-20 bg-white p-6 rounded shadow">

<h2 class="text-xl font-bold mb-4">Fraud Result</h2>

<div id="result"></div>

<a href="index.html" class="text-blue-500">Back</a>

</div>

<script>

const data = JSON.parse(localStorage.getItem("fraudResult"))

document.getElementById("result").innerHTML = `
<p>Account: ${data.account}</p>
<p>Withdraw Count: ${data.withdraw_count}</p>
<p>Total Amount: ${data.total_amount}</p>
<p>Risk Score: ${data.risk_score}</p>
<p>Risk Level: ${data.risk_level}</p>
<p>Action: ${data.action}</p>
`

</script>

</body>
</html>
