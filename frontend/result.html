<!DOCTYPE html>
<html>
<head>
<title>Fraud Result</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-lg mx-auto mt-20 bg-white p-6 rounded shadow">

<h2 class="text-xl font-bold mb-4">Fraud Result</h2>

<div id="result"></div>

<a href="index.html" class="text-blue-500">← Back</a>

</div>

<script>

const data = JSON.parse(localStorage.getItem("fraudResult"))

let html = ""

if(!data){
    html = `<p class="text-red-500">No data found</p>`
}

// 🔴 PERMANENT BLOCK
else if(data.status === "BLOCKED"){
    html = `
    <div class="text-red-600">
        <h3 class="text-lg font-bold">🚨 Account Permanently Blocked</h3>
        <p><b>Account:</b> ${data.account}</p>
        <p class="mt-2">
            Your account has been <b>permanently blocked</b> due to suspicious activity.
        </p>
        <p>Please contact your nearest bank branch immediately.</p>
    </div>
    `
}

// 🟡 TEMP BLOCK
else if(data.status === "TEMP_BLOCK"){

    const endTime = new Date(data.block_until)

    function updateTimer(){
        const now = new Date()
        const diff = endTime - now

        if(diff <= 0){
            document.getElementById("result").innerHTML = `
            <p class="text-green-600">✅ Block expired. You can try again.</p>
            `
            return
        }

        const hours = Math.floor(diff / (1000*60*60))
        const minutes = Math.floor((diff % (1000*60*60)) / (1000*60))
        const seconds = Math.floor((diff % (1000*60)) / 1000)

        document.getElementById("result").innerHTML = `
        <div class="text-yellow-600">
            <h3 class="text-lg font-bold">⏳ Temporary Block</h3>
            <p><b>Account:</b> ${data.account}</p>
            <p>Your account is temporarily blocked.</p>
            <p class="mt-2 font-bold">⏱ Time Remaining:</p>
            <p>${hours}h ${minutes}m ${seconds}s</p>
        </div>
        `
    }

    updateTimer()
    setInterval(updateTimer, 1000)
}

// 🟢 NORMAL RESULT
else{
    html = `
    <div class="text-green-700">
        <p><b>Account:</b> ${data.account}</p>
        <p>Withdraw Count: ${data.withdraw_count}</p>
        <p>Total Amount: ${data.total_amount}</p>
        <p>Risk Score: ${data.risk_score}</p>
        <p>Risk Level: ${data.risk_level}</p>
        <p><b>Action:</b> ${data.action}</p>
    </div>
    `
}

document.getElementById("result").innerHTML = html

</script>

</body>
</html>
